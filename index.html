<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Scanner Kehadiran</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-6 text-center">
  <h1 class="text-2xl font-bold text-emerald-700 mb-4">Scanner QR Kehadiran</h1>

  <!-- Video kamera -->
  <video id="video" width="320" height="240" autoplay class="mx-auto rounded-xl shadow-lg"></video>
  <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>

  <!-- Status card -->
  <div id="status-container" class="mt-6 p-6 rounded-3xl hidden border-2 text-left">
    <p id="status-title" class="font-black text-xl uppercase tracking-tight mb-1"></p>
    <p id="status-body" class="text-sm font-medium leading-tight opacity-90"></p>
  </div>

  <!-- Tombol -->
  <button onclick="startScanner()" 
    class="bg-emerald-600 hover:bg-emerald-700 text-white w-full py-3 rounded-2xl font-bold mt-6">
    Buka Kamera
  </button>
</div>

<script>
  let isProcessing = false;
  let audioCtx;

  // --- Audio beep ---
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playBeep(freq, duration) {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  // --- Scanner ---
  function startScanner() {
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusContainer = document.getElementById("status-container");

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(stream => {
        video.srcObject = stream;
        statusContainer.classList.remove("hidden");
        statusContainer.className = "mt-6 p-6 rounded-3xl border-2 bg-blue-50 border-blue-200 text-blue-800 block";
        document.getElementById("status-title").innerText = "Verifikasi...";
        document.getElementById("status-body").innerText = "Arahkan kamera ke QR Code";

        setInterval(() => {
          if (isProcessing) return;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);
          if (code) {
            isProcessing = true;
            document.getElementById("status-title").innerText = "Memproses...";
            document.getElementById("status-body").innerText = "Kode terbaca: " + code.data;

            // --- Kirim ke GAS Web App ---
            fetch("YOUR_GAS_WEBAPP_URL", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ qrcode: code.data })
            })
            .then(res => res.json())
            .then(res => {
              statusContainer.className = `mt-6 p-6 rounded-3xl border-2 ${res.success ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-rose-50 border-rose-200 text-rose-800'}`;
              document.getElementById("status-title").innerText = res.success ? "✓ Berhasil" : "✗ Gagal";
              document.getElementById("status-body").innerText = res.message;
              playBeep(res.success ? 880 : 440, res.success ? 0.2 : 0.4);
              setTimeout(() => { isProcessing = false; }, 3000);
            })
            .catch(err => {
              statusContainer.className = "mt-6 p-6 rounded-3xl border-2 bg-rose-50 border-rose-200 text-rose-800 block";
              document.getElementById("status-title").innerText = "System Error";
              document.getElementById("status-body").innerText = "Koneksi terputus.";
              playBeep(220, 0.5);
              setTimeout(() => { isProcessing = false; }, 5000);
            });
          }
        }, 500);
      })
      .catch(err => {
        document.getElementById("status-title").innerText = "Error Kamera";
        document.getElementById("status-body").innerText = err.name + " - " + err.message;
      });
  }
</script>
</body>
</html>
